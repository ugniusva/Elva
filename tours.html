<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ELVA — Tours</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--fg: rgba(255,255,255,.92);
--fg2: rgba(255,255,255,.78);
--fg3: rgba(255,255,255,.6);
--shadow:0 18px 70px rgba(0,0,0,.55);
}

*{box-sizing:border-box}

html,body{
height:100%;
margin:0;
overflow:hidden;
background:#000;
color:var(--fg);
font-family:"Playfair Display", serif;
}

a{color:inherit;text-decoration:none}

/* NAVBAR */

header{
position:absolute;
top:0;
left:0;
right:0;
padding:40px 60px;
z-index:5;

display:grid;
grid-template-columns:1fr auto 1fr;
align-items:start;
}

.nav-left,.nav-right{
display:flex;
gap:60px;
align-items:center;
font-family:"Playfair Display", serif;
font-size:20px;
letter-spacing:.05em;
}

.nav-left{justify-content:flex-start}
.nav-right{justify-content:flex-end}

header a{
color:var(--fg2);
padding:6px 12px;
border-radius:6px;
transition:all .25s ease;
}

header a:hover{
background:rgba(0,0,0,.35);
color:var(--fg);
}

.brand{
text-align:center;
line-height:1.1;
text-shadow:var(--shadow);
}

.brand .logo{
font-size:40px;
letter-spacing:.08em;
}

.brand .year{
margin-top:10px;
font-size:18px;
letter-spacing:.3em;
color:var(--fg3);
}

/* PAGE LAYOUT */

.page{
height:100vh;
display:grid;
grid-template-columns:1fr 700px 1fr;
align-items:center;
padding:0 60px;
}

/* LEFT IMAGE */

.left img{
width:100%;
max-width:420px;
opacity:.9;
}

/* RIGHT IMAGE */

.right img{
width:100%;
max-width:420px;
opacity:.9;
}

/* CENTER TEXT */

.center{
text-align:center;
max-width:600px;
margin:auto;
}

.center h1{
font-size:48px;
margin:0;
letter-spacing:.03em;
}

.center p{
margin-top:18px;
font-size:16px;
line-height:1.9;
color:var(--fg3);
font-family:ui-sans-serif,system-ui;
}

/* CONTACT BUTTON */

.btn{
display:inline-block;
margin-top:40px;
padding:14px 34px;
border:1px solid rgba(255,255,255,.35);
border-radius:30px;
font-size:16px;
letter-spacing:.08em;
transition:all .25s ease;
}

.btn:hover{
background:rgba(255,255,255,.15);
transform:translateY(-2px);
}

</style>
</head>

<body>

<header>

<nav class="nav-left">
<a href="about.html">About</a>
</nav>

<a class="brand" href="index.html">
<div class="logo">ELVA</div>
<div class="year">EST. 1850</div>
</a>

<nav class="nav-right">
<a href="tours.html">Tours</a>
<a href="contact.html">Contact</a>
</nav>

</header>

<div class="page">

<div class="left">
<img src="images/image4.png">
</div>

<div class="center">

<h1>Estate Tours</h1>

<p>
Experience the vineyards up close with private guided tours through the ELVA estate.
Walk the historic grounds, explore the cellars, and taste carefully selected wines
that represent generations of craftsmanship.
</p>

<a class="btn" href="contact.html">Book a Tour</a>

</div>

<div class="right">
<img src="images/image3.png">
</div>

</div>

</body>
</html>
