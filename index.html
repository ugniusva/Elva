<!-- index.html (styled to match your reference layout) -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ELVA</title>
  <style>
    :root{
      --fg: rgba(255,255,255,.92);
      --fg2: rgba(255,255,255,.78);
      --fg3: rgba(255,255,255,.62);
      --shadow: 0 18px 70px rgba(0,0,0,.55);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-serif, Georgia, "Times New Roman", Times, serif;
      background:#000;
      color:var(--fg);
      overflow:hidden;
    }
    a{color:inherit; text-decoration:none}

    /* HERO */
    .hero{
      position:relative;
      width:100vw; height:100vh;
      overflow:hidden;
      background:#000;
    }
    .hero video{
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:cover;
      /* barely touched */
      filter: contrast(1.02) saturate(1.02) brightness(.995);
      transform: scale(1.01);
    }
    /* very subtle top dark so nav is readable, like reference */
    .overlay{
      position:absolute; inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.28), rgba(0,0,0,0) 28%),
        radial-gradient(900px 520px at 50% 52%, rgba(0,0,0,0), rgba(0,0,0,.14) 80%, rgba(0,0,0,.22) 100%);
      pointer-events:none;
    }

    /* NAV BAR (left links, centered brand stack, right links) */
    header{
      position:absolute;
      top:0; left:0; right:0;
      padding: 22px 28px;
      z-index:5;

      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:start;
    }
    .nav-left, .nav-right{
      display:flex;
      gap:28px;
      align-items:center;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial;
      font-size:16px;
      letter-spacing:.02em;
    }
    .nav-left{justify-content:flex-start}
    .nav-right{justify-content:flex-end}

    /* NAV BAR (scaled up x3) */
header{
  position:absolute;
  top:0; left:0; right:0;
  padding: 40px 60px;   /* much bigger spacing */
  z-index:5;

  display:grid;
  grid-template-columns: 1fr auto 1fr;
  align-items:start;
}

.nav-left, .nav-right{
  display:flex;
  gap:60px;                     /* bigger spacing between links */
  align-items:center;
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial;
  font-size:20px;               /* ~3x bigger */
  letter-spacing:.02em;
}

.nav-left{justify-content:flex-start}
.nav-right{justify-content:flex-end}

header a{
  color: var(--fg2);
  transition: color .2s ease;
}

header a:hover{
  color: var(--fg);
}

/* Center brand */
.brand{
  text-align:center;
  line-height:1.1;
  user-select:none;
  text-shadow: var(--shadow);
}

.brand .logo{
  font-size:40px;        /* was ~18px */
  letter-spacing:.06em;
  font-weight:500;
}

.brand .year{
  margin-top:12px;
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial;
  font-size:20px;       
  letter-spacing:.30em;
  color: var(--fg3);
}
    /* CENTER TITLE */
    .center{
      position:absolute;
      left:50%; top:54%;
      transform: translate(-50%, -50%);
      text-align:center;
      z-index:4;
      width:min(980px, 92vw);
      text-shadow: var(--shadow);
    }
    .title{
      margin:0;
      font-weight: 500;
      font-size: clamp(44px, 5.8vw, 86px);
      letter-spacing: .01em;
    }
    .tagline{
      margin: 10px 0 0;
      font-size: clamp(18px, 2.0vw, 26px);
      font-weight: 400;
      color: rgba(255,255,255,.80);
    }

    /* OPTIONAL: tiny bottom-left mute button (like reference, but optional) */
    .mute{
      position:absolute;
      left:18px;
      bottom:18px;
      z-index:6;
      width:42px; height:42px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.20);
      background: rgba(0,0,0,.18);
      backdrop-filter: blur(8px);
      display:grid;
      place-items:center;
      cursor:pointer;
      transition: background .2s ease, transform .2s ease, border-color .2s ease;
    }

    /* PAGE TRANSITION */
    .fade{
      position:fixed; inset:0;
      background:#000;
      opacity:0;
      pointer-events:none;
      transition: opacity .22s ease;
      z-index:999;
    }
    .fade.on{opacity:1}

    @media (prefers-reduced-motion: reduce){
  header a,.fade{transition:none}
    }
  </style>
</head>
<body>
  <div class="fade" id="fade"></div>

  <section class="hero">
    <video id="bgvid" autoplay muted loop playsinline preload="metadata">
      <source src="/video/hero.mp4" type="video/mp4" />
    </video>
    <div class="overlay"></div>

    <header>
      <nav class="nav-left">
        <a href="about.html" data-nav>About</a>
      </nav>

      <a class="brand" href="index.html" data-nav>
        <div class="logo">ELVA</div>
        <div class="year">EST. 1850</div>
      </a>

      <nav class="nav-right">
        <a href="contact.html" data-nav>Contacts</a>
        <a href="contact.html" data-nav>Mail us</a>
      </nav>
    </header>

    <div class="center">
      <h1 class="title">ELVA</h1>
      <div class="tagline">a curated wine experience</div>
    </div>

  </section>

  <script>
    // page fade transition
    const fade = document.getElementById("fade");
    function go(url){
      fade.classList.add("on");
      setTimeout(() => location.href = url, 150);
    }
    document.querySelectorAll("a[data-nav]").forEach(a => {
      a.addEventListener("click", (e) => {
        const url = a.getAttribute("href");
        if (!url || url.startsWith("#")) return;
        e.preventDefault();
        go(url);
      });
    });
    window.addEventListener("pageshow", () => fade.classList.remove("on"));
    
  </script>
</body>
</html>
